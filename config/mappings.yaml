# Event and outcome name normalization mappings
# Maps source-specific names to canonical names for matching

events:
  # Example: map 'Lakers vs Celtics' across sources
  nba_finals_2024:
    sources:
      kalshi: "NBA Finals 2024"
      odds_api: "Los Angeles Lakers vs Boston Celtics"
      polymarket: "NBA Finals 2024 Winner"
    canonical: "NBA Finals 2024"
    outcomes:
      - name: "Lakers win"
        aliases:
          kalshi: "Lakers"
          odds_api: "Los Angeles Lakers"
          polymarket: "Lakers"
      - name: "Celtics win"
        aliases:
          kalshi: "Celtics"
          odds_api: "Boston Celtics"
          polymarket: "Celtics"

# Fees by source (as a percentage of stake)
fees:
  kalshi: 0.5  # Roughly 0.5% maker/taker per leg
  odds_api: 0.0  # The Odds API is just data; sportsbooks handle vig
  polymarket: 0.2  # Polygon/Gamma fees
